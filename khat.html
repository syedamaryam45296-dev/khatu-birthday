<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Khatuu ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

.container{
    padding:40px 20px;
}

h1{
    font-size:3rem;
    margin-bottom:15px;
}

.subtitle{
    font-size:1.2rem;
    margin-bottom:30px;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin:40px 0;
}

.frame{
    background:white;
    padding:10px;
    border-radius:20px;
    width:250px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.frame img{
    width:100%;
    height:280px;
    object-fit:cover;
    border-radius:15px;
}

.caption{
    color:#ff4f81;
    font-weight:bold;
    margin-top:10px;
}

.letter{
    max-width:900px;
    margin:40px auto;
    padding:25px;
    background:rgba(255,255,255,0.15);
    border-radius:20px;
    backdrop-filter:blur(10px);
}

.letter h2{
    margin-bottom:20px;
}

#message{
    white-space:pre-line;
    font-size:20px;
    line-height:1.8;
    text-align:left;
}

.balloon{
    position:fixed;
    bottom:-150px;
    width:70px;
    height:90px;
    border-radius:50%;
    animation:float 12s linear infinite;
}

.balloon::after{
    content:'';
    position:absolute;
    width:2px;
    height:70px;
    background:white;
    left:50%;
    top:100%;
}

.b1{left:10%;background:#ff4f81;}
.b2{left:30%;background:#00c2ff;animation-delay:2s;}
.b3{left:50%;background:#ffd700;animation-delay:4s;}
.b4{left:70%;background:#9b59b6;animation-delay:1s;}
.b5{left:90%;background:#2ecc71;animation-delay:3s;}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}

.footer{
    margin:40px 0;
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎂 Happy Birthday Khatuu 🎂</h1>

<div class="subtitle">
More than a friend, you're my sister 🫂💋 ❤️
</div>

<div class="gallery">

<div class="frame">
<img src="photo5.jpg">
<div class="caption">Our Beautiful Memories ❤️</div>
</div>

<div class="frame">
<img src="photo2.jpg">
<div class="caption">Partners Forever🤞✨</div>
</div>

<div class="frame">
<img src="photo4.jpg">
<div class="caption">Best Friends Forever 💕</div>
</div>

<div class="frame">
<img src="photo3.jpg">
<div class="caption">My Khatuu 😘</div>
</div>

</div>

<section class="letter">
<h2>💌 A Letter For My Khatuu 💌</h2>
<p id="message"></p>
</section>

<div class="footer">
❤️ Forever Your sister ,  ❤️
</div>

</div>

<div class="balloon b1"></div>
<div class="balloon b2"></div>
<div class="balloon b3"></div>
<div class="balloon b4"></div>
<div class="balloon b5"></div>

<script>
const text = `Happy Birthday, Khatuu ❤️

You entered my life as a friend, but today you're so much more than that. You're my sister from another mother, my safe place, and one of the most precious people in my life.

Thank you for every laugh, every memory, every crazy moment, and every time you stood by me. Life feels brighter because you're in it.

No matter how busy life gets or where our paths take us, you'll always have a special place in my heart.

On your birthday, I pray that Allah blesses you with happiness, success, good health, and endless smiles. May all your dreams come true and may your heart always be filled with peace.

May Allah bless you with a loving, caring, and righteous life partner who respects you, supports your dreams, and fills your life with happiness and endless love. Ameen. ❤️🤲

Thank you for being my Khatuu. I am truly lucky to have you.

Happy Birthday, my sister, my best friend, my forever person. ❤️

— Your dearest , Maryam 😁❤️`;

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}

window.onload = typeWriter;
</script>

</body>
</html>
